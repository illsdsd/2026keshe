server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: campuslink-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campuslink?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT 配置
campuslink:
  jwt:
    secret: campuslink-secret-key-for-jwt-signing-must-be-long-enough-2026
    # 过期时间（毫秒），默认 7 天
    expiration: 604800000
    header: Authorization
    prefix: "Bearer "
  file:
    storage-path: ${user.home}/campuslink/uploads
    max-size-mb: 50
    allowed-extensions: jpg,jpeg,png,gif,bmp,pdf,doc,docx,xls,xlsx,ppt,pptx,zip,rar,7z,txt,md
  mail:
    mock: true
    sender: noreply@campuslink.local
  security:
    max-login-fail: 5
    lock-minutes: 10
  schedule:
    recruit-expire-cron: "0 0/30 * * * ?"
    team-archive-cron: "0 0 3 * * ?"
    task-overdue-cron: "0 0 9 * * ?"
    file-clean-cron: "0 0 4 * * ?"
    message-digest-cron: "0 0 20 * * ?"
  feature:
    admin-enabled: true

logging:
  level:
    com.campuslink: debug
